<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System 2026 | Labschool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Sora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #0ea5e9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(36, 97, 228, 0.4);
        }
        .hidden-section { display: none; }
        
        /* Gaya Tombol Dinamis */
        .btn-action {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-recording {
            background: rgba(225, 29, 72, 0.2) !important;
            color: #fb7185 !important;
            border-color: rgba(225, 29, 72, 0.4) !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }
        .live-text {
            color: #38bdf8;
            font-style: italic;
        }
    </style>
</head>

            }

            const terms = searchName.split(" ").filter(x => x.length > 0);
            filtered = filtered.filter(s => terms.every(term => s.toLowerCase().includes(term)));

            if (filtered.length > 0) {
                if(!detectedClassCode) detectedClassCode = filtered[0].split(' ').pop();
                return filtered[0];
            }
            detectedClassCode = "";
            return "SISWA TIDAK DIKENALI";
        }

        function checkSendButton() {
            document.getElementById("sendBtn").disabled = !(finalMatchedStudent && lastTranscriptReason && !finalMatchedStudent.includes("TIDAK"));
        }

        document.getElementById("toggleNameBtn").onclick = () => toggleRec('name');
        document.getElementById("toggleReasonBtn").onclick = () => toggleRec('reason');

        document.getElementById("sendBtn").onclick = async () => {
            const btn = document.getElementById("sendBtn");
            const msg = document.getElementById("message");
            const chatId = GROUP_MAPPING[detectedClassCode];
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID');
            const dateStr = now.toLocaleDateString('id-ID');

            btn.disabled = true;
            msg.textContent = "TRANSMITTING...";
            msg.className = "text-center text-xs mt-4 font-medium text-sky-400";

            const pureName = finalMatchedStudent.replace(" " + detectedClassCode, "");
            const telegramText = `🚨 *LAPORAN KEHADIRAN 2026*\n\n👤 *Nama:* ${pureName}\n🏫 *Kelas:* ${detectedClassCode}\n📝 *Alasan:* ${lastTranscriptReason}\n⏰ *Waktu:* ${timeStr}\n📅 *Tanggal:* ${dateStr}`;

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: chatId, text: telegramText, parse_mode: "Markdown" })
                });

                msg.textContent = "SUCCESSFULLY TRANSMITTED";
                msg.className = "text-center text-xs mt-4 font-medium text-emerald-400";
                
                setTimeout(() => {
                    finalMatchedStudent = ""; lastTranscriptReason = "";
                    document.getElementById("outputName").textContent = "Sebutkan Nama & Kelas...";
                    document.getElementById("outputReason").textContent = "Sebutkan alasan anda...";
                    document.getElementById("liveTranscriptName").textContent = "...";
                    document.getElementById("liveTranscriptReason").textContent = "...";
                    msg.textContent = "";
                }, 3000);

            } catch (e) {
                msg.textContent = "CONNECTION ERROR";
                msg.className = "text-center text-xs mt-4 font-medium text-rose-400";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
