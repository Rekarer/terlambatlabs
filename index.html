    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Efek glass-card tetap dipertahankan dengan backdrop blur */
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
        }
        /* Hover efek pada card */
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.7);
        }

        .login-input {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            color: white;
        }
        
        .login-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.3);
            outline: none;
            background: rgba(0, 0, 0, 0.6);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -8px rgba(37, 99, 235, 0.5);
        }
        
        .btn-primary:active:not(:disabled) {
            transform: translateY(1px);
        }
        
        .hidden-section {
            display: none;
        }
        
        .recording-pulse {
            animation: pulse 1.5s infinite;
            background-color: rgba(225, 29, 72, 0.2) !important;
            border-color: #e11d48 !important;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(225, 29, 72, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(225, 29, 72, 0);
            }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0ea5e9;
            border-radius: 10px;
        }
        
        /* Responsive fix untuk mobile */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
                align-items: flex-start;
            }
            .glass-card {
                border-radius: 1.75rem;
                padding: 1.5rem !important;
            }
        }
    </style>

                    document.getElementById("outputName").innerHTML = finalMatchedStudent;
                    if (finalMatchedStudent.includes("TIDAK DIKENALI")) {
                        document.getElementById("outputName").classList.add("text-rose-300");
                    } else {
                        document.getElementById("outputName").classList.remove("text-rose-300");
                    }
                } else if (currentTarget === 'reason') {
                    lastTranscriptReason = cleanText;
                    document.getElementById("outputReason").innerHTML = `📝 ${cleanText.toUpperCase()}`;
                }
            };

            recognition.onend = () => {
                const startName = document.getElementById("startNameBtn");
                const startReason = document.getElementById("startReasonBtn");
                [startName, startReason].forEach(btn => btn.classList.remove('recording-pulse'));
                document.getElementById("statusName").textContent = "Status: ✅ SIAP";
                document.getElementById("statusReason").textContent = "Status: ✅ SIAP";
                document.getElementById("stopNameBtn").disabled = true;
                document.getElementById("stopReasonBtn").disabled = true;
                checkSendButton();
            };
            
            recognition.onerror = (event) => {
                console.warn("Speech error: ", event.error);
                if (currentTarget === 'name') {
                    document.getElementById("outputName").innerHTML = "⚠️ Gagal menangkap suara, coba lagi.";
                } else {
                    document.getElementById("outputReason").innerHTML = "⚠️ Error microphone, ulangi.";
                }
                recognition.stop();
            };
        } else {
            alert("Browser Anda tidak mendukung Speech Recognition. Gunakan Chrome / Edge terbaru.");
        }

        function matchStudentByVoice(text) {
            const lowerText = text.toLowerCase();
            const classRegex = /(sebelas|11|xi)\s*([a-i])/i;
            const match = lowerText.match(classRegex);
            let matchedClass = "";
            let searchName = lowerText;
            
            if (match) {
                matchedClass = "XI-" + match[2].toUpperCase();
                searchName = lowerText.replace(match[0], "").trim();
                detectedClassCode = matchedClass;
            } else {
                detectedClassCode = "";
            }
            
            let filteredStudents = [...studentDatabase];
            if (matchedClass) {
                filteredStudents = filteredStudents.filter(s => s.endsWith(matchedClass));
            }
            
            const nameTokens = searchName.split(/\s+/).filter(t => t.length > 1);
            if (nameTokens.length > 0) {
                filteredStudents = filteredStudents.filter(student => 
                    nameTokens.every(token => student.toLowerCase().includes(token))
                );
            }
            
            if (filteredStudents.length > 0) {
                const bestMatch = filteredStudents[0];
                if (!detectedClassCode) detectedClassCode = bestMatch.split(' ').pop();
                return bestMatch;
            }
            detectedClassCode = "";
            return "❌ SISWA TIDAK DIKENALI";
        }

        function checkSendButton() {
            const isValid = finalMatchedStudent && 
                            lastTranscriptReason && 
                            !finalMatchedStudent.includes("TIDAK DIKENALI") &&
                            finalMatchedStudent !== "❌ SISWA TIDAK DIKENALI";
            document.getElementById("sendBtn").disabled = !isValid;
        }

        // Event listeners tombol record
        if (recognition) {
            document.getElementById("startNameBtn").onclick = () => { 
                if (recognition && recognition.state !== "recording") {
                    currentTarget = 'name'; 
                    recognition.start();
                }
            };
            document.getElementById("startReasonBtn").onclick = () => { 
                if (recognition && recognition.state !== "recording") {
                    currentTarget = 'reason'; 
                    recognition.start();
                }
            };
            document.getElementById("stopNameBtn").onclick = () => recognition.stop();
            document.getElementById("stopReasonBtn").onclick = () => recognition.stop();
        }

        // Reset state antar session
        function resetFormState() {
            finalMatchedStudent = "";
            lastTranscriptReason = "";
            detectedClassCode = "";
            document.getElementById("outputName").innerHTML = "🎤 Sebutkan Nama & Kelas (contoh: Farhan XI-A)...";
            document.getElementById("outputReason").innerHTML = "📢 Sebutkan alasan keterlambatan...";
            document.getElementById("statusName").textContent = "Status: Ready";
            document.getElementById("statusReason").textContent = "Status: Idle";
            document.getElementById("sendBtn").disabled = true;
            document.getElementById("message").innerHTML = "";
        }

        // Submit data ke Webhook & Telegram
        document.getElementById("sendBtn").onclick = async () => {
            const btn = document.getElementById("sendBtn");
            const msgDiv = document.getElementById("message");
            const chatId = GROUP_MAPPING[detectedClassCode];
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${hours}.${minutes}.${seconds}`;
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const dateStr = `${day}/${month}/${year}`;
            
            const pureName = finalMatchedStudent.replace(/\s+XI-[A-I]$/, "").trim().toUpperCase();
            const formattedPayload = `${timeStr}|${pureName}|${detectedClassCode}|${lastTranscriptReason}|${dateStr}`;
            const telegramText = `🚨 *LAPORAN KEHADIRAN 2026*\n\n👤 *Nama:* ${pureName}\n🏫 *Kelas:* ${detectedClassCode}\n📝 *Alasan:* ${lastTranscriptReason}\n⏰ *Waktu:* ${timeStr}\n📅 *Tanggal:* ${dateStr}\n\n\`${formattedPayload}\``;
            
            btn.disabled = true;
            msgDiv.innerHTML = "📡 MENGIRIM DATA...";
            msgDiv.className = "text-center text-xs mt-4 font-medium text-sky-300";
            
            const requests = [];
            if (chatId) {
                requests.push(
                    fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: chatId, text: telegramText, parse_mode: "Markdown" })
                    })
                );
            }
            if (WEBHOOK_URL && WEBHOOK_URL !== "YOUR_WEBHOOK_URL_HERE") {
                requests.push(
                    fetch(WEBHOOK_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            text: formattedPayload,
                            time: timeStr,
                            name: pureName,
                            class: detectedClassCode,
                            reason: lastTranscriptReason,
                            date: dateStr
                        })
                    })
                );
            }
            
            try {
                const results = await Promise.allSettled(requests);
                const anySuccess = results.some(r => r.status === "fulfilled");
                if (anySuccess || requests.length === 0) {
                    msgDiv.innerHTML = `✅ BERHASIL: ${formattedPayload}`;
                    msgDiv.className = "text-center text-xs mt-4 font-medium text-emerald-400";
                    setTimeout(() => {
                        resetFormState();
                    }, 3800);
                } else {
                    throw new Error("Gagal mengirim ke semua endpoint");
                }
            } catch (err) {
                msgDiv.innerHTML = "⚠️ GAGAL TERKONEKSI, cek jaringan";
                msgDiv.className = "text-center text-xs mt-4 font-medium text-rose-400";
                btn.disabled = false;
            }
        };
        
        // initial reset
        resetFormState();
    </script>
</body>
